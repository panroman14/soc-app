# soc — canonical nginx JSON access log.
#
# Install: copy into /etc/nginx/conf.d/ (it lives inside the `http {}` block) and
# point your sites at the `soc_json` format:
#
#     access_log /var/log/nginx/access.json.log soc_json;
#
# Promtail tails that file and pushes to Loki; the soc backend's loki.py reads
# these EXACT field names via `| json` — do not rename fields without updating it.
#
# ── real client IP behind Cloudflare ──────────────────────────────────────────
# When the site sits behind Cloudflare, $remote_addr is the CF edge. CF sends the
# true visitor IP in CF-Connecting-IP. We surface it as its own field; the soc app
# decides whether to TRUST it (it cross-checks that $remote_addr is a real CF edge
# range — see loki.py / blocklist CF_RANGES — so a forged header from a non-CF
# client is ignored). Empty when the request didn't arrive through Cloudflare.
map $http_cf_connecting_ip $soc_real_ip_cf {
    default   "";
    "~."      $http_cf_connecting_ip;
}

log_format soc_json escape=json '{'
    '"time":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"real_ip_cloudflare":"$soc_real_ip_cf",'
    '"http_x_forwarded_for":"$http_x_forwarded_for",'
    '"http_host":"$host",'
    '"request_method":"$request_method",'
    '"request_uri":"$request_uri",'
    '"status":"$status",'
    '"body_bytes_sent":"$body_bytes_sent",'
    '"bytes_sent":"$bytes_sent",'
    '"request_time":"$request_time",'
    '"upstream_response_time":"$upstream_response_time",'
    '"upstream_cache_status":"$upstream_cache_status",'
    '"http_referer":"$http_referer",'
    '"http_user_agent":"$http_user_agent"'
'}';
