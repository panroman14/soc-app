# soc — Loki (single-binary, filesystem storage) for a plain VM. Sized for one
# central collector that several nginx VMs push into. Env-overridable so the same
# file works under systemd and Docker. Start with `-config.expand-env=true`.

auth_enabled: false

server:
  http_listen_port: ${LOKI_PORT:-3100}
  grpc_listen_port: 0
  log_level: ${LOKI_LOG_LEVEL:-warn}

common:
  instance_addr: 127.0.0.1
  path_prefix: ${LOKI_DATA_DIR:-/var/lib/loki}
  storage:
    filesystem:
      chunks_directory: ${LOKI_DATA_DIR:-/var/lib/loki}/chunks
      rules_directory: ${LOKI_DATA_DIR:-/var/lib/loki}/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: ${LOKI_RETENTION:-336h}   # 14 days
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  max_query_series: 10000
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32

compactor:
  working_directory: ${LOKI_DATA_DIR:-/var/lib/loki}/compactor
  retention_enabled: true
  delete_request_store: filesystem

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100
