<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 430" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <style>
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    .card{fill:#141a23;stroke:#232b38}
    .row{fill:#0f1520;stroke:#232b38}
    .lbl{fill:#5b6675;font-size:11px}
    .name{fill:#e7ecf4;font-size:13px;font-weight:600}
  </style>
  <rect width="960" height="430" fill="#0b0e14"/>

  <!-- header -->
  <rect x="16" y="16" width="928" height="72" rx="12" class="card"/>
  <text x="34" y="44" fill="#e7ecf4" font-size="15" font-weight="600">🚫 403 rules — block by path</text>
  <text x="34" y="66" fill="#8c98ab" font-size="12">Paths that return <tspan fill="#e07070">403</tspan> immediately. Not an IP ban — the path itself is cut, on every attached target.</text>
  <!-- type presets -->
  <rect x="690" y="30" width="74" height="20" rx="10" fill="#12171f" stroke="#2a3340"/><text x="727" y="44" text-anchor="middle" font-size="10" fill="#8c98ab">wp-scan</text>
  <rect x="772" y="30" width="74" height="20" rx="10" fill="#12171f" stroke="#2a3340"/><text x="809" y="44" text-anchor="middle" font-size="10" fill="#8c98ab">dotfiles</text>
  <rect x="854" y="30" width="74" height="20" rx="10" fill="#12171f" stroke="#2a3340"/><text x="891" y="44" text-anchor="middle" font-size="10" fill="#8c98ab">exploits</text>

  <!-- active rules -->
  <rect x="16" y="100" width="928" height="314" rx="12" class="card"/>
  <text x="34" y="126" fill="#c4cdda" font-size="13" font-weight="500">Active rules <tspan fill="#5b6675">3</tspan></text>
  <rect x="700" y="112" width="180" height="22" rx="6" fill="#0a0e14" stroke="#2a3340"/><text x="712" y="127" font-size="11" fill="#5b6675" class="mono">🔍 search name / pattern…</text>
  <rect x="888" y="112" width="24" height="22" rx="6" fill="#12171f" stroke="#2a3340"/><text x="900" y="127" text-anchor="middle" font-size="11" fill="#8c98ab">↻</text>

  <!-- rule 1 (main) -->
  <rect x="32" y="146" width="896" height="76" rx="10" fill="#0f1520" stroke="#a1751f" stroke-opacity=".5"/>
  <rect x="46" y="160" width="34" height="20" rx="10" fill="#0e3020" stroke="#1f7a4d"/><text x="63" y="174" text-anchor="middle" font-size="10" font-weight="700" fill="#6ee7b7">ON</text>
  <text x="92" y="170" font-size="13" fill="#f0b429">★</text>
  <text x="108" y="174" class="name">wp-scan</text>
  <rect x="176" y="161" width="58" height="16" rx="4" fill="#3a2e0e"/><text x="205" y="173" text-anchor="middle" font-size="9" fill="#f0b429">main</text>
  <text x="46" y="192" class="lbl">base-scanners · 12 Jun · 240 chars</text>
  <!-- attach chips -->
  <text x="46" y="212" class="lbl">applies to</text>
  <rect x="112" y="200" width="92" height="16" rx="8" fill="#0f2016" stroke="#1f5138"/><circle cx="122" cy="208" r="3" fill="#6fcf97"/><text x="132" y="212" font-size="10" fill="#a7d9bf">edge-1</text>
  <rect x="210" y="200" width="92" height="16" rx="8" fill="#0f2016" stroke="#1f5138"/><circle cx="220" cy="208" r="3" fill="#6fcf97"/><text x="230" y="212" font-size="10" fill="#a7d9bf">edge-2</text>
  <rect x="308" y="200" width="90" height="16" rx="8" fill="#0e1a2e" stroke="#1e3a5f"/><circle cx="318" cy="208" r="3" fill="#60a5fa"/><text x="328" y="212" font-size="10" fill="#9cc0ff">k8s-prod</text>
  <rect x="404" y="200" width="58" height="16" rx="8" fill="#12171f" stroke="#2a3340"/><text x="433" y="212" text-anchor="middle" font-size="10" fill="#8c98ab">+ attach</text>
  <!-- right buttons -->
  <rect x="770" y="160" width="70" height="20" rx="5" fill="#1a2130"/><text x="805" y="174" text-anchor="middle" font-size="10" fill="#c4cdda">pattern ▾</text>
  <rect x="846" y="160" width="26" height="20" rx="5" fill="#1a2130"/><text x="859" y="174" text-anchor="middle" font-size="10" fill="#a5b4fc">✎</text>
  <rect x="878" y="160" width="26" height="20" rx="5" fill="#1a2130"/><text x="891" y="174" text-anchor="middle" font-size="10" fill="#f0a2a2">🗑</text>

  <!-- rule 2 -->
  <rect x="32" y="230" width="896" height="76" rx="10" class="row"/>
  <rect x="46" y="244" width="34" height="20" rx="10" fill="#0e3020" stroke="#1f7a4d"/><text x="63" y="258" text-anchor="middle" font-size="10" font-weight="700" fill="#6ee7b7">ON</text>
  <text x="92" y="254" font-size="13" fill="#3d4654">★</text>
  <text x="108" y="258" class="name">dotfiles</text>
  <text x="46" y="276" class="lbl">base-scanners · 12 Jun · 86 chars</text>
  <text x="46" y="296" class="lbl">applies to</text>
  <rect x="112" y="284" width="92" height="16" rx="8" fill="#0f2016" stroke="#1f5138"/><circle cx="122" cy="292" r="3" fill="#6fcf97"/><text x="132" y="296" font-size="10" fill="#a7d9bf">edge-1</text>
  <rect x="210" y="284" width="90" height="16" rx="8" fill="#0e1a2e" stroke="#1e3a5f"/><circle cx="220" cy="292" r="3" fill="#60a5fa"/><text x="230" y="296" font-size="10" fill="#9cc0ff">k8s-prod</text>
  <rect x="306" y="284" width="58" height="16" rx="8" fill="#12171f" stroke="#2a3340"/><text x="335" y="296" text-anchor="middle" font-size="10" fill="#8c98ab">+ attach</text>
  <rect x="770" y="244" width="70" height="20" rx="5" fill="#1a2130"/><text x="805" y="258" text-anchor="middle" font-size="10" fill="#c4cdda">pattern ▾</text>
  <rect x="846" y="244" width="26" height="20" rx="5" fill="#1a2130"/><text x="859" y="258" text-anchor="middle" font-size="10" fill="#a5b4fc">✎</text>
  <rect x="878" y="244" width="26" height="20" rx="5" fill="#1a2130"/><text x="891" y="258" text-anchor="middle" font-size="10" fill="#f0a2a2">🗑</text>

  <!-- rule 3 (off, unattached) -->
  <rect x="32" y="314" width="896" height="76" rx="10" class="row" opacity=".6"/>
  <rect x="46" y="328" width="36" height="20" rx="10" fill="#161c27" stroke="#2a3340"/><text x="64" y="342" text-anchor="middle" font-size="10" font-weight="700" fill="#5b6675">OFF</text>
  <text x="92" y="338" font-size="13" fill="#3d4654">★</text>
  <text x="108" y="342" class="name" fill="#c4cdda">log4j-jndi</text>
  <text x="46" y="360" class="lbl">you · 2 Jul · 54 chars</text>
  <text x="46" y="380" font-size="11" fill="#4a5568">nothing attached — click + attach</text>
  <rect x="200" y="368" width="58" height="16" rx="8" fill="#12171f" stroke="#2a3340"/><text x="229" y="380" text-anchor="middle" font-size="10" fill="#8c98ab">+ attach</text>
  <rect x="770" y="328" width="70" height="20" rx="5" fill="#1a2130"/><text x="805" y="342" text-anchor="middle" font-size="10" fill="#c4cdda">pattern ▾</text>
  <rect x="846" y="328" width="26" height="20" rx="5" fill="#1a2130"/><text x="859" y="342" text-anchor="middle" font-size="10" fill="#a5b4fc">✎</text>
  <rect x="878" y="328" width="26" height="20" rx="5" fill="#1a2130"/><text x="891" y="342" text-anchor="middle" font-size="10" fill="#f0a2a2">🗑</text>
</svg>
