<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <style>
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    .card{fill:#141a23;stroke:#232b38}
    .row{fill:#0f1520;stroke:#232b38}
    .lbl{fill:#5b6675;font-size:11px}
    .name{fill:#e7ecf4;font-size:13px;font-weight:600}
    .tag{font-size:10px}
  </style>
  <rect width="960" height="400" fill="#0b0e14"/>

  <!-- kill switch: armed -->
  <rect x="16" y="16" width="928" height="58" rx="12" fill="#0e2018" stroke="#1f5138"/>
  <text x="34" y="42" fill="#a7f3d0" font-size="14" font-weight="600">Auto-ban engine</text>
  <text x="34" y="62" fill="#8c98ab" font-size="12">Armed — rules that match ≥ threshold add IP bans automatically.</text>
  <rect x="812" y="30" width="116" height="28" rx="8" fill="#0e3020" stroke="#1f7a4d"/>
  <circle cx="832" cy="44" r="4" fill="#10b981"/><text x="846" y="49" font-size="12" fill="#6ee7b7">ARMED · disarm</text>

  <!-- rules -->
  <rect x="16" y="86" width="928" height="298" rx="12" class="card"/>
  <text x="34" y="112" fill="#c4cdda" font-size="13" font-weight="500">Rules <tspan fill="#5b6675">3</tspan></text>
  <rect x="770" y="98" width="158" height="24" rx="7" fill="#2b1620" stroke="#7a2540"/><text x="849" y="114" text-anchor="middle" font-size="11" fill="#f0a2b0">🔍 Preview (dry-run)</text>

  <!-- rule 1: path -->
  <rect x="32" y="132" width="896" height="70" rx="10" class="row"/>
  <rect x="46" y="146" width="34" height="20" rx="10" fill="#0e3020" stroke="#1f7a4d"/><text x="63" y="160" text-anchor="middle" font-size="10" font-weight="700" fill="#6ee7b7">ON</text>
  <text x="92" y="160" class="name">WP-login brute</text>
  <rect x="212" y="147" width="66" height="17" rx="4" fill="#1e2547"/><text x="245" y="160" text-anchor="middle" class="tag" fill="#a5b4fc">path</text>
  <text x="46" y="184" class="lbl">/wp-login.php, /xmlrpc.php · <tspan fill="#c4cdda">≥ 2</tspan> in <tspan fill="#c4cdda">5m</tspan> · combine paths</text>
  <text x="700" y="160" class="lbl" text-anchor="end">group</text><rect x="710" y="147" width="86" height="17" rx="4" fill="#0f2016"/><text x="753" y="160" text-anchor="middle" class="tag" fill="#a7d9bf">edge</text>
  <text x="700" y="184" class="lbl" text-anchor="end">TTL</text><text x="712" y="184" class="mono" font-size="11" fill="#c4cdda">30d</text>

  <!-- rule 2: rate -->
  <rect x="32" y="210" width="896" height="70" rx="10" class="row"/>
  <rect x="46" y="224" width="34" height="20" rx="10" fill="#0e3020" stroke="#1f7a4d"/><text x="63" y="238" text-anchor="middle" font-size="10" font-weight="700" fill="#6ee7b7">ON</text>
  <text x="92" y="238" class="name">Flood / any path</text>
  <rect x="212" y="225" width="66" height="17" rx="4" fill="#2a2340"/><text x="245" y="238" text-anchor="middle" class="tag" fill="#c4b5fd">rate</text>
  <rect x="284" y="225" width="86" height="17" rx="4" fill="#3a2e0e"/><text x="327" y="238" text-anchor="middle" class="tag" fill="#f0b429">country ≠ home</text>
  <text x="46" y="262" class="lbl"><tspan fill="#c4cdda">≥ 300</tspan> req in <tspan fill="#c4cdda">1m</tspan> · status 4xx/5xx</text>
  <text x="700" y="238" class="lbl" text-anchor="end">group</text><rect x="710" y="225" width="86" height="17" rx="4" fill="#0e1a2e"/><text x="753" y="238" text-anchor="middle" class="tag" fill="#9cc0ff">all</text>
  <text x="700" y="262" class="lbl" text-anchor="end">TTL</text><text x="712" y="262" class="mono" font-size="11" fill="#c4cdda">7d</text>

  <!-- rule 3: family, off -->
  <rect x="32" y="288" width="896" height="54" rx="10" class="row" opacity=".6"/>
  <rect x="46" y="300" width="36" height="20" rx="10" fill="#161c27" stroke="#2a3340"/><text x="64" y="314" text-anchor="middle" font-size="10" font-weight="700" fill="#5b6675">OFF</text>
  <text x="92" y="314" class="name" fill="#c4cdda">CRS payloads (SQLi/XSS/RCE)</text>
  <rect x="266" y="301" width="80" height="17" rx="4" fill="#241a2e"/><text x="306" y="314" text-anchor="middle" class="tag" fill="#d8b4fe">family</text>
  <text x="360" y="314" class="lbl">≥ 1 · signature match</text>

  <!-- dry-run preview strip -->
  <rect x="32" y="350" width="896" height="26" rx="8" fill="#1a1020" stroke="#3a2030"/>
  <text x="46" y="367" font-size="11" fill="#f0a2b0">🔍 dry-run:</text>
  <text x="118" y="367" class="mono" font-size="11" fill="#c4cdda">would ban 14 IPs</text>
  <text x="250" y="367" class="mono" font-size="11" fill="#5b6675">45.9.x.x · 185.2.x.x · 51.7.x.x · … (no bans applied)</text>
</svg>
