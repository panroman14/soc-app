name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile (syntax) all Python
        run: |
          python -m py_compile backend/app/*.py blocklist-api/app/*.py deploy/agent/soc-nginx-agent.py

      - name: Lint shell scripts
        run: |
          sh -n deploy/agent/install.sh
          bash -n deploy/inventory-deploy.sh
          bash -n tests/smoke.sh

      - name: Validate YAML (compose + promtail + CI)
        run: |
          python -m pip install --quiet pyyaml
          python - <<'PY'
          import yaml
          for f in ["deploy/compose/docker-compose.yml",
                    "deploy/promtail/promtail.yml",
                    "deploy/promtail/promtail-combined.yml",
                    ".github/workflows/ci.yml"]:
              yaml.safe_load(open(f))
          print("yaml ok")
          PY

      - name: Unit tests (fan-out / LogQL / egress)
        run: |
          python -m pip install --quiet -r backend/requirements.txt
          python backend/tests/test_units.py

      - uses: azure/setup-helm@v4

      - name: Helm chart lint + render (incl. fail-closed guard)
        run: |
          helm lint blocklist-api --set token=ci
          helm template blocklist-api --set token=ci >/dev/null
          helm template blocklist-api --set bakedImage=true --set image=reg/x@sha256:0 >/dev/null
          # the chart MUST refuse to render with no token / existingSecret / devNoAuth
          if helm template blocklist-api >/dev/null 2>&1; then
            echo "FAIL: chart rendered without auth (fail-closed guard broken)"; exit 1
          fi

      - name: End-to-end smoke test (blocklist-api)
        run: ./tests/smoke.sh

      - name: Dependency audit (non-blocking)
        run: |
          python -m pip install --quiet pip-audit
          pip-audit -r backend/requirements.txt || true
          pip-audit -r blocklist-api/requirements.txt || true
