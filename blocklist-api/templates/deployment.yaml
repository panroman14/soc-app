{{- /* Fail closed: refuse to render a ban API with no auth. Provide a token
       (--set token=$(openssl rand -hex 32)) or an existingSecret with key
       BLOCKLIST_TOKEN. To run open on a trusted host, set devNoAuth=true. */ -}}
{{- if and (not .Values.token) (not .Values.existingSecret) (not .Values.devNoAuth) }}
{{- fail "blocklist-api: set .Values.token or .Values.existingSecret (BLOCKLIST_TOKEN). To run WITHOUT auth on a trusted host, set --set devNoAuth=true." }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blocklist-api
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "blocklist-api.labels" . | indent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: blocklist-api
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
{{ include "blocklist-api.labels" . | indent 8 }}
      annotations:
        {{- if not .Values.bakedImage }}
        # re-roll the pod whenever the code ConfigMap changes
        checksum/code: {{ .Files.Glob "app/*.py" | toString | sha256sum }}
        {{- end }}
    spec:
      serviceAccountName: blocklist-api
      {{- if not .Values.bakedImage }}
      initContainers:
        - name: deps
          image: {{ .Values.image }}
          command: ["sh", "-c", "pip install --no-cache-dir --target=/deps {{ .Values.pipPackages }}"]
          volumeMounts:
            - { name: deps, mountPath: /deps }
      {{- end }}
      containers:
        - name: api
          image: {{ .Values.image }}
          {{- if not .Values.bakedImage }}
          workingDir: /srv
          command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8080"]
          {{- end }}
          env:
            {{- if not .Values.bakedImage }}
            - name: PYTHONPATH
              value: /deps:/srv
            {{- end }}
            {{- if or .Values.token .Values.existingSecret }}
            - name: BLOCKLIST_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "blocklist-api.secretName" . }}
                  key: BLOCKLIST_TOKEN
            {{- end }}
            {{- if .Values.devNoAuth }}
            - { name: DEV_NO_AUTH, value: "1" }   # trusted-host opt-in: API served WITHOUT auth
            {{- end }}
            - { name: CONTROLLER_NS, value: "{{ .Values.controllerNamespace }}" }
            - { name: CONTROLLER_CM, value: "{{ .Values.controllerConfigMap }}" }
            - { name: DENYLIST_NS, value: "{{ .Release.Namespace }}" }
            - { name: DENYLIST_CM, value: "{{ .Values.denylistConfigMap }}" }
            - { name: ALLOWLIST, value: "{{ .Values.allowlist }}" }
            - { name: MIN_PREFIX_V4, value: "{{ .Values.minPrefixV4 }}" }
            - { name: MIN_PREFIX_V6, value: "{{ .Values.minPrefixV6 }}" }
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 15
          resources: {{ .Values.resources | toYaml | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            allowPrivilegeEscalation: false
            seccompProfile: { type: RuntimeDefault }
            {{- if .Values.bakedImage }}
            readOnlyRootFilesystem: true          # baked image needs no writable FS
            {{- end }}
            capabilities: { drop: ["ALL"] }
          {{- if not .Values.bakedImage }}
          volumeMounts:
            - { name: code, mountPath: /srv/app, readOnly: true }
            - { name: deps, mountPath: /deps, readOnly: true }
          {{- end }}
      {{- if not .Values.bakedImage }}
      volumes:
        - name: code
          configMap:
            name: blocklist-api-code
        - name: deps
          emptyDir: {}
      {{- end }}
