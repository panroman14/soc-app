apiVersion: v1
kind: ServiceAccount
metadata:
  name: blocklist-api
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "blocklist-api.labels" . | indent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: blocklist-denylist
  namespace: {{ .Release.Namespace }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["{{ .Values.denylistConfigMap }}"]
    verbs: ["get", "update", "patch"]
  # create (no resourceName allowed) so the api can self-create the denylist CM
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: blocklist-denylist
  namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: blocklist-denylist
subjects:
  - kind: ServiceAccount
    name: blocklist-api
    namespace: {{ .Release.Namespace }}
---
# cross-namespace: patch the ingress-nginx controller ConfigMap
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: blocklist-controller
  namespace: {{ .Values.controllerNamespace }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["{{ .Values.controllerConfigMap }}"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: blocklist-controller
  namespace: {{ .Values.controllerNamespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: blocklist-controller
subjects:
  - kind: ServiceAccount
    name: blocklist-api
    namespace: {{ .Release.Namespace }}
