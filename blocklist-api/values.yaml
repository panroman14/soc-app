# Default (convenience): a stock python image runs code shipped in a ConfigMap; an
# initContainer pip-installs deps at startup. SECURITY (S7): this pulls from PyPI on
# every pod start with no hash pinning, off a FLOATING base tag — supply-chain risk
# for a pod that holds RBAC to patch the ingress controller. HARDENED PATH: build the
# baked image (blocklist-api/Dockerfile), push it, and set bakedImage=true with
# `image` pinned by digest, e.g.:
#   --set bakedImage=true --set image=REGISTRY/blocklist-api@sha256:<digest>
# bakedImage=true drops the initContainer, the code ConfigMap and the runtime pip.
bakedImage: false
image: python:3.12-slim          # baked mode: set to your digest-pinned app image
# deps for the non-baked initContainer path (kept in sync with blocklist-api/requirements.txt)
pipPackages: "fastapi==0.115.* uvicorn[standard]==0.32.* kubernetes==29.0.0"

# Bearer token the dashboard must send. Set via:  --set token=$(openssl rand -hex 32)
# Leave empty + set existingSecret to reuse a pre-made Secret instead.
token: ""
existingSecret: ""   # name of a Secret with key BLOCKLIST_TOKEN (overrides token)
# Fail-closed guard: the chart refuses to render with no token AND no existingSecret.
# To run the API WITHOUT auth on a trusted host, set this true (sets DEV_NO_AUTH=1).
devNoAuth: false

# ingress-nginx controller ConfigMap to patch (where geo/server-snippet land)
controllerNamespace: ingress-nginx
controllerConfigMap: ingress-nginx-controller

# data store ConfigMap (created in the release namespace)
denylistConfigMap: soc-denylist

# never-blockable IPs (office + monitoring VMs); CIDRs covering them are refused too
allowlist: "192.0.2.10,198.51.100.10,198.51.100.20,192.0.2.20"

minPrefixV4: 16
minPrefixV6: 32

ingress:
  enabled: true
  className: nginx
  host: block-api.example.com
  whitelistSourceRange: "198.51.100.20/32, 192.0.2.10/32"
  tls:
    enabled: true
    secretName: block-api-tls
    clusterIssuer: letsencrypt-prod

resources:
  requests: { cpu: 20m, memory: 64Mi }
  limits: { cpu: 200m, memory: 192Mi }
